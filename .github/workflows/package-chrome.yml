name: Package Chrome Extension

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install test dependencies
        run: npm ci

      - name: Run automated tests
        run: npm test

      - name: Build Chrome package
        id: package
        shell: pwsh
        run: ./scripts/package-chrome.ps1 -WriteGitHubOutput

      - name: Upload Chrome package artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-${{ steps.package.outputs.package_version }}
          path: |
            ${{ steps.package.outputs.package_path }}
            ${{ steps.package.outputs.contents_path }}
            ${{ steps.package.outputs.release_notes_path }}
          if-no-files-found: error
