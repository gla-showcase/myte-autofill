name: Release Chrome Extension

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install test dependencies
        run: npm ci

      - name: Run automated tests
        run: npm test

  release:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate tag matches manifest version
        shell: pwsh
        run: |
          $manifest = Get-Content -Path ./manifest.json -Raw | ConvertFrom-Json
          $manifestVersion = [string]$manifest.version
          if (-not $manifestVersion) {
            throw 'manifest.json is missing a version value.'
          }

          $tagVersion = '${{ github.ref_name }}' -replace '^v', ''
          if ($tagVersion -ne $manifestVersion) {
            throw "Tag version v$tagVersion does not match manifest.json version $manifestVersion"
          }

      - name: Build Chrome package
        id: package
        shell: pwsh
        run: ./scripts/package-chrome.ps1 -WriteGitHubOutput

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.package.outputs.release_notes_path }}
          files: |
            ${{ steps.package.outputs.package_path }}
            ${{ steps.package.outputs.contents_path }}
            ${{ steps.package.outputs.release_notes_path }}
          fail_on_unmatched_files: true